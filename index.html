<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Palette — by Creatis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F2ED;
  --surface: #FDFCFA;
  --border: #E2DDD6;
  --text: #1C1A17;
  --muted: #8A8278;
  --faint: #C4BDB4;
  --chip: #EEE9E2;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-pill: 99px;

  --yellow:  #F5C518;
  --orange:  #E8763A;
  --red:     #C94040;
  --blue:    #4A7FA5;
  --purple:  #7B5EA7;
  --black:   #2A2420;
  --green:   #4A8C5C;
  --brown:   #7A5C3A;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141210;
    --surface: #1E1C18;
    --border: #2E2A24;
    --text: #F0EDE8;
    --muted: #8A8278;
    --faint: #4A4540;
    --chip: #252218;
  }
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

.app {
  max-width: 560px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 1.75rem;
}
.header h1 {
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: var(--text);
}
.header span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1.125rem 1.25rem;
  margin-bottom: 1rem;
}
.card-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* Effect pills */
.effect-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.effect-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.effect-pill:hover { color: var(--text); border-color: var(--faint); }
.effect-pill:active { transform: scale(0.97); }
.effect-pill.active {
  background: var(--text);
  border-color: var(--text);
  color: var(--bg);
}
.effect-pill-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.effect-pill.active .effect-pill-dot {
  opacity: 1;
  background: var(--bg);
}

/* Effect description */
.effect-desc {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  line-height: 1.6;
  display: none;
}
.effect-desc.visible { display: block; }

/* Colour preview */
.preview {
  border-radius: var(--radius-md);
  height: 100px;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.6s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  position: relative;
  overflow: hidden;
}
.preview-label {
  font-size: 18px;
  font-weight: 300;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  display: none;
  letter-spacing: 0.01em;
}
.preview-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  display: none;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.preview.active .preview-label,
.preview.active .preview-sub { display: block; }

/* Colour group sections */
.group-section { margin-bottom: 1.25rem; }
.group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.group-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.group-name {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.group-weight-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  margin-left: auto;
  transition: all 0.3s;
}
.group-weight-badge.primary {
  background: var(--text);
  color: var(--bg);
}
.group-weight-badge.supporting {
  background: var(--chip);
  color: var(--muted);
  border: 1px solid var(--border);
}
.group-weight-badge.suppressed {
  background: transparent;
  color: var(--faint);
  border: 1px dashed var(--border);
}
.group-weight-badge.neutral {
  display: none;
}

/* Group dimming */
.group-section.suppressed .ingredient-card {
  opacity: 0.45;
}
.group-section.suppressed .group-name {
  color: var(--faint);
}

/* Ingredient cards */
.ingredient-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.ingredient-card {
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  padding: 10px 6px 8px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s, background 0.15s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  position: relative;
}
.ingredient-card:hover { transform: translateY(-1px); }
.ingredient-card:active { transform: scale(0.96); }
.ingredient-card.selected {
  background: var(--chip);
}
.ingredient-card.selected::after {
  content: '✓';
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 9px;
  color: var(--muted);
}
.ingredient-emoji {
  font-size: 22px;
  display: block;
  margin-bottom: 5px;
  line-height: 1;
}
.ingredient-name {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.3;
}

/* Result card */
.result-swatch-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 1rem;
}
.result-swatch {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  flex-shrink: 0;
  transition: background 0.4s;
}
.result-name {
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.01em;
}
.result-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.04em;
}
.result-principle {
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.5;
}

/* Effect alignment score */
.alignment {
  margin-top: 1rem;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chip);
}
.alignment-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.alignment-bar-track {
  height: 4px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}
.alignment-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--text);
  transition: width 0.5s ease;
}
.alignment-text {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  line-height: 1.5;
}

/* Composition bars */
.composition { margin-top: 1rem; }
.comp-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.comp-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.comp-bar-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  width: 54px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.comp-bar-track {
  flex: 1;
  height: 5px;
  background: var(--chip);
  border-radius: 3px;
  overflow: hidden;
}
.comp-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.comp-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--faint);
  width: 16px;
  text-align: right;
  flex-shrink: 0;
}

/* Selected ingredients display */
.selected-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.selected-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  padding: 4px 10px 4px 6px;
  border-radius: var(--radius-pill);
  background: var(--chip);
  border: 1px solid var(--border);
  color: var(--muted);
}
.pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Shift suggestion */
.shift-box {
  margin-top: 1rem;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chip);
}
.shift-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.shift-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.shift-ingredient {
  font-weight: 500;
  font-style: italic;
}

/* Empty state */
.empty {
  font-size: 14px;
  color: var(--faint);
  text-align: center;
  padding: 1.5rem 0;
  font-style: italic;
}

/* Actions */
.action-row {
  display: flex;
  gap: 8px;
  margin-top: 1rem;
}
.btn {
  padding: 9px 16px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.7; }

/* Footer */
.footer {
  text-align: center;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.footer a {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--faint);
  text-decoration: none;
  letter-spacing: 0.04em;
}
.footer a:hover { color: var(--muted); }
.footer span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--faint);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Palette</h1>
    <span>Colour & Nourishment · Creatis</span>
  </div>

  <!-- Step 1: Effect -->
  <div class="card">
    <div class="card-label">What are you eating for?</div>
    <div class="effect-pills" id="effectPills"></div>
    <div class="effect-desc" id="effectDesc"></div>
  </div>

  <!-- Preview -->
  <div id="preview" class="preview">
    <span id="previewLabel" class="preview-label"></span>
    <span id="previewSub" class="preview-sub"></span>
  </div>

  <!-- Step 2: Ingredient selection -->
  <div class="card">
    <div class="card-label">Select your ingredients</div>
    <div id="ingredientGrid"></div>
  </div>

  <!-- Result -->
  <div class="card">
    <div id="empty" class="empty">Select an effect and ingredients to see your colour profile.</div>
    <div id="result" style="display:none">
      <div class="result-swatch-row">
        <div id="resultSwatch" class="result-swatch"></div>
        <div>
          <div id="resultName" class="result-name"></div>
          <div id="resultSub" class="result-sub"></div>
          <div id="resultPrinciple" class="result-principle"></div>
        </div>
      </div>

      <div id="alignmentBox" class="alignment" style="display:none">
        <div class="alignment-label">Alignment with <span id="alignmentEffect"></span></div>
        <div class="alignment-bar-track">
          <div class="alignment-bar-fill" id="alignmentBar"></div>
        </div>
        <div class="alignment-text" id="alignmentText"></div>
      </div>

      <div class="composition">
        <div class="comp-label">Composition</div>
        <div id="compBars"></div>
      </div>

      <div id="selectedPills" class="selected-pills"></div>

      <div id="shiftBox" class="shift-box" style="display:none">
        <div class="shift-label">Suggested shift</div>
        <div id="shiftText" class="shift-text"></div>
      </div>

      <div class="action-row">
        <button class="btn" onclick="clearAll()">Clear all</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>Built by </span><a href="https://creatis.in/pages/stack" target="_blank" rel="noopener">The Creatis Stack</a>
  </div>

</div>
<script>
/* ─── Colour groups ─── */
const GROUPS = [
  {
    key: "yellow", name: "Yellow", color: "#F5C518",
    principle: "Fast, bright, and dominant — powerful in the right proportion, unstable alone.",
    food: "Simple carbs — quick energy, real but short-lived.",
    ingredients: [
      { name: "White Rice", emoji: "🍚" },
      { name: "Banana",     emoji: "🍌" },

    ingredients: [

];

/* ─── Effects ─── */
// weight: 1.5 = primary, 1.0 = supporting, 0.3 = suppressed, 1.0 = neutral (black always 1.0)
const EFFECTS = [
  {
    key: "energy",
    label: "Energy",
    description: "Fuel that moves fast and builds momentum. Prioritises quick and sustained carbohydrates with a protein base.",

    suggestion: (gc) => {
      if (!(gc.red > 0)) return `Add a <span class="shift-ingredient">Red</span> ingredient — protein is the anchor of any satiating meal.`;
      if (!(gc.blue > 0)) return `Add a <span class="shift-ingredient">Blue</span> ingredient — fat slows digestion and extends fullness significantly.`;
      if (gc.yellow > 1) return `You have multiple <span class="shift-ingredient">Yellow</span> ingredients — simple carbs will shorten how long this meal holds you.`;
      return `Strong satiety composition. Protein, fat, and slow carbs are all present.`;
    }
  },
  {
    key: "clarity",
    label: "Clarity",
    description: "Mental clearness and steady attention. Prioritises anti-inflammatory foods and healthy fats that support brain function.",
    weights: { yellow: 0.3, orange: 1.0, red: 1.0, blue: 1.5, purple: 1.5, black: 1.0, green: 1.5, brown: 1.0 },
    primaryGroups: ["green", "purple", "blue"],
    suggestion: (gc) => {
      if (!(gc.purple > 0)) return `Add a <span class="shift-ingredient">Purple</span> ingredient — phytonutrients are the quiet engine of cognitive clarity.`;
      if (!(gc.blue > 0)) return `Add a <span class="shift-ingredient">Blue</span> ingredient — the brain runs on healthy fats.`;
      if (!(gc.green > 0)) return `Add a <span class="shift-ingredient">Green</span> ingredient to ground and clear the composition.`;
      return `Well-tuned for clarity. Anti-inflammatory and fat-rich foods are well represented.`;
    }
  },
  {
    key: "longevity",
    label: "Longevity",
    description: "Eating for the long arc. Protective, anti-inflammatory, slow-releasing foods that compound over time.",
    weights: { yellow: 0.3, orange: 1.0, red: 1.0, blue: 1.5, purple: 1.5, black: 1.0, green: 1.5, brown: 1.5 },
    primaryGroups: ["purple", "brown", "green", "blue"],
    suggestion: (gc) => {
      if (!(gc.purple > 0)) return `Add a <span class="shift-ingredient">Purple</span> ingredient — protective phytonutrients are the cornerstone of longevity eating.`;
      if (!(gc.green > 0)) return `Add a <span class="shift-ingredient">Green</span> ingredient — fibre and greens support the systems that sustain you long-term.`;

      return `Strong longevity profile. Protective, slow, and anti-inflammatory foods are well represented.`;

  {
    key: "antifragility",

    weights: { yellow: 1.0, orange: 1.0, red: 1.0, blue: 1.0, purple: 1.5, black: 1.0, green: 1.5, brown: 1.0 },
    primaryGroups: ["purple", "green"],
    suggestion: (gc) => {
      const activeGroups = Object.entries(gc).filter(([,v]) => v > 0).length;
      if (activeGroups < 4) return `Anti-fragility requires range. You have ${activeGroups} group${activeGroups !== 1 ? 's' : ''} — aim for at least 4 to 5.`;
      const dominated = Object.entries(gc).sort((a,b)=>b[1]-a[1]);
      if (dominated[0][1] >= 3) {
        const domGroup = GROUPS.find(g => g.key === dominated[0][0]);
        return `Heavy on <span class="shift-ingredient">${domGroup.name}</span>. Anti-fragility is built on diversity, not dominance — pull back and spread wider.`;
      }
      return `Good range. Your composition draws from multiple systems — this is what anti-fragility looks like.`;
    }
  },
  {
    key: "calm",
    label: "Calm",
    description: "Settling the nervous system. Slow, grounding foods that reduce stimulation and support rest.",
    weights: { yellow: 0.3, orange: 1.0, red: 1.0, blue: 1.5, purple: 1.0, black: 1.0, green: 1.5, brown: 1.5 },
    primaryGroups: ["blue", "green"],
    suggestion: (gc) => {
      if (gc.yellow > 0) return `<span class="shift-ingredient">Yellow</span> ingredients — simple carbs — introduce a spike-and-drop cycle that works against calm.`;
      if (!(gc.blue > 0)) return `Add a <span class="shift-ingredient">Blue</span> ingredient — healthy fats slow everything down in the best way.`;
      if (!(gc.green > 0)) return `Add a <span class="shift-ingredient">Green</span> ingredient to ground the composition.`;
      return `This is a calming composition. Slow, grounding, and without sharp stimulation.`;
    }
  }
];

/* ─── State ─── */
const selected = new Set();
let activeEffect = null;

/* ─── Build effect pills ─── */
const pillsContainer = document.getElementById("effectPills");
EFFECTS.forEach(effect => {
  const pill = document.createElement("button");
  pill.className = "effect-pill";
  pill.id = `effect-${effect.key}`;
  pill.innerHTML = `<span class="effect-pill-dot"></span>${effect.label}`;
  pill.addEventListener("click", () => toggleEffect(effect.key));
  pillsContainer.appendChild(pill);
});

function toggleEffect(key) {
  if (activeEffect === key) {
    activeEffect = null;
    document.querySelectorAll('.effect-pill').forEach(p => p.classList.remove("active"));
    document.getElementById("effectDesc").classList.remove("visible");
    document.getElementById("effectDesc").textContent = "";
  } else {
    activeEffect = key;
    document.querySelectorAll('.effect-pill').forEach(p => p.classList.remove("active"));
    document.getElementById(`effect-${key}`).classList.add("active");
    const effect = EFFECTS.find(e => e.key === key);
    const desc = document.getElementById("effectDesc");
    desc.textContent = effect.description;
    desc.classList.add("visible");
  }
  applyEffectWeights();
  updateResult();
}

/* ─── Build ingredient grid ─── */
const grid = document.getElementById("ingredientGrid");
GROUPS.forEach(group => {
  const section = document.createElement("div");
  section.className = "group-section";
  section.id = `section-${group.key}`;
  section.innerHTML = `
    <div class="group-header">
      <div class="group-dot" style="background:${group.color}"></div>
      <div class="group-name">${group.name}</div>
      <span class="group-weight-badge neutral" id="badge-${group.key}"></span>
    </div>
    <div class="ingredient-grid" id="grid-${group.key}"></div>`;
  grid.appendChild(section);

  const iGrid = section.querySelector(`#grid-${group.key}`);
  group.ingredients.forEach((ing, i) => {
    const key = `${group.key}:${i}`;
    const card = document.createElement("div");
    card.className = "ingredient-card";
    card.id = `card-${key}`;
    card.innerHTML = `
      <span class="ingredient-emoji">${ing.emoji}</span>
      <span class="ingredient-name">${ing.name}</span>`;
    card.addEventListener("click", () => toggleIngredient(key, group, i, card));
    iGrid.appendChild(card);
  });
});

function applyEffectWeights() {
  GROUPS.forEach(group => {
    const section = document.getElementById(`section-${group.key}`);
    const badge = document.getElementById(`badge-${group.key}`);

    if (!activeEffect) {
      section.classList.remove("suppressed");
      badge.className = "group-weight-badge neutral";
      badge.textContent = "";
      return;
    }

    const effect = EFFECTS.find(e => e.key === activeEffect);
    const weight = effect.weights[group.key];

    section.classList.remove("suppressed");
    badge.className = "group-weight-badge";

    if (weight >= 1.4) {
      badge.classList.add("primary");
      badge.textContent = "Primary";
    } else if (weight <= 0.4) {
      badge.classList.add("suppressed");
      badge.textContent = "Low";
      section.classList.add("suppressed");
    } else if (effect.primaryGroups.includes(group.key)) {
      badge.classList.add("supporting");
      badge.textContent = "Supporting";
    } else {
      badge.className = "group-weight-badge neutral";
      badge.textContent = "";
    }
  });
}

function toggleIngredient(key, group, idx, card) {
  if (selected.has(key)) {
    selected.delete(key);
    card.classList.remove("selected");
    card.style.borderColor = "var(--border)";
  } else {
    selected.add(key);
    card.classList.add("selected");
    card.style.borderColor = group.color;
  }
  updateResult();
}

/* ─── Colour mixing with effect weights ─── */
function hexToRgb(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}

function getMealColor(groupCounts) {
  const effect = activeEffect ? EFFECTS.find(e => e.key === activeEffect) : null;
  let r=0, g=0, b=0, total=0;
  Object.entries(groupCounts).forEach(([key, count]) => {
    if (count === 0) return;
    const group = GROUPS.find(gr => gr.key === key);
    const weight = effect ? effect.weights[key] : 1.0;
    const [cr,cg,cb] = hexToRgb(group.color);
    const contribution = count * weight;
    r += cr * contribution;
    g += cg * contribution;
    b += cb * contribution;
    total += contribution;
  });
  if (total === 0) return null;
  return rgbToHex(r/total, g/total, b/total);
}

/* ─── Alignment score ─── */
function getAlignmentScore(groupCounts) {
  if (!activeEffect) return null;
  const effect = EFFECTS.find(e => e.key === activeEffect);
  let score = 0, maxScore = 0;

  Object.entries(groupCounts).forEach(([key, count]) => {
    if (count === 0) return;
    const weight = effect.weights[key];
    // Primary adds, suppressed subtracts slightly, neutral neutral
    if (weight >= 1.4) score += count * 2;
    else if (weight <= 0.4) score -= count * 1;
    else score += count * 1;
    maxScore += count * 2;
  });

  // Clamp 0–100
  const pct = Math.max(0, Math.min(100, Math.round((score / Math.max(maxScore, 1)) * 100)));
  return pct;
}

/* ─── Profile name ─── */
function getProfileName(groupCounts) {
  const sorted = Object.entries(groupCounts)
    .filter(([,v]) => v > 0)
    .sort((a,b) => b[1]-a[1]);
  if (sorted.length === 0) return null;
  const top = sorted.slice(0,2).map(([k]) => GROUPS.find(g => g.key === k).name);
  return top.join('–');
}

/* ─── Update result ─── */
function updateResult() {
  const groupCounts = {};
  GROUPS.forEach(g => { groupCounts[g.key] = 0; });
  selected.forEach(key => {
    const [groupKey] = key.split(':');
    groupCounts[groupKey]++;
  });

  const totalSelected = selected.size;

  if (totalSelected === 0) {
    document.getElementById("empty").style.display = "block";
    document.getElementById("result").style.display = "none";
    document.getElementById("preview").classList.remove("active");
    document.getElementById("preview").style.background = "var(--chip)";
    return;
  }

  const hex = getMealColor(groupCounts);
  const profileName = getProfileName(groupCounts);
  const dominantKey = Object.entries(groupCounts).sort((a,b)=>b[1]-a[1])[0][0];
  const dominantGroup = GROUPS.find(g => g.key === dominantKey);

  // Preview
  const preview = document.getElementById("preview");
  preview.style.background = hex;
  preview.classList.add("active");
  document.getElementById("previewLabel").textContent = profileName;
  document.getElementById("previewSub").textContent = `${totalSelected} ingredient${totalSelected!==1?'s':''}`;

  // Result
  document.getElementById("resultSwatch").style.background = hex;
  document.getElementById("resultName").textContent = profileName;
  document.getElementById("resultSub").textContent = dominantGroup.food;
  document.getElementById("resultPrinciple").textContent = `"${dominantGroup.principle}"`;

  // Alignment
  const alignmentBox = document.getElementById("alignmentBox");
  if (activeEffect) {
    const score = getAlignmentScore(groupCounts);
    const effect = EFFECTS.find(e => e.key === activeEffect);
    document.getElementById("alignmentEffect").textContent = effect.label;
    document.getElementById("alignmentBar").style.width = `${score}%`;
    let alignText = "";
    if (score >= 80) alignText = "Your ingredients are closely aligned with this effect.";
    else if (score >= 50) alignText = "Partial alignment — your composition moves in the right direction.";
    else if (score >= 20) alignText = "Weak alignment — consider shifting your ingredient balance.";
    else alignText = "Low alignment — the composition works against this effect.";
    document.getElementById("alignmentText").textContent = alignText;
    alignmentBox.style.display = "block";
  } else {
    alignmentBox.style.display = "none";
  }

  // Composition bars
  const maxCount = Math.max(...Object.values(groupCounts), 1);
  document.getElementById("compBars").innerHTML = GROUPS.map(g => {
    const count = groupCounts[g.key];
    if (count === 0) return '';
    const pct = (count / maxCount) * 100;
    return `<div class="comp-bar-wrap">
      <div class="comp-bar-label">${g.name}</div>
      <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${pct}%;background:${g.color}"></div></div>
      <div class="comp-count">${count}</div>
    </div>`;
  }).join("");

  // Pills
  const pills = [];
  selected.forEach(key => {
    const [groupKey, idx] = key.split(':');
    const group = GROUPS.find(g => g.key === groupKey);
    const ing = group.ingredients[parseInt(idx)];
    pills.push(`<div class="selected-pill">
      <span class="pill-dot" style="background:${group.color}"></span>
      ${ing.emoji} ${ing.name}
    </div>`);
  });
  document.getElementById("selectedPills").innerHTML = pills.join("");

  // Shift suggestion
  const shiftBox = document.getElementById("shiftBox");
  if (activeEffect) {
    const effect = EFFECTS.find(e => e.key === activeEffect);
    const suggestion = effect.suggestion(groupCounts);
    document.getElementById("shiftText").innerHTML = suggestion;
    shiftBox.style.display = "block";
  } else {
    shiftBox.style.display = "none";
  }

  document.getElementById("empty").style.display = "none";
  document.getElementById("result").style.display = "block";
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.ingredient-card').forEach(c => {
    c.classList.remove("selected");
    c.style.borderColor = "var(--border)";
  });
  updateResult();
}
</script>
