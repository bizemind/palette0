<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Palette — by Creatis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F2ED;
  --surface: #FDFCFA;
  --border: #E2DDD6;
  --text: #1C1A17;
  --muted: #8A8278;
  --faint: #C4BDB4;
  --chip: #EEE9E2;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-pill: 99px;

  --yellow:  #F5C518;
  --orange:  #E8763A;
  --red:     #C94040;
  --blue:    #4A7FA5;
  --purple:  #7B5EA7;
  --black:   #2A2420;
  --green:   #4A8C5C;
  --brown:   #7A5C3A;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141210;
    --surface: #1E1C18;
    --border: #2E2A24;
    --text: #F0EDE8;
    --muted: #8A8278;
    --faint: #4A4540;
    --chip: #252218;
  }
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

.app {
  max-width: 560px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 1.75rem;
}
.header h1 {
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: var(--text);
}
.header span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1.125rem 1.25rem;
  margin-bottom: 1rem;
}
.card-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* Colour preview */
.preview {
  border-radius: var(--radius-md);
  height: 100px;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  background: var(--chip);
  transition: background 0.6s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  position: relative;
  overflow: hidden;
}
.preview-label {
  font-size: 18px;
  font-weight: 300;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  display: none;
  letter-spacing: 0.01em;
}
.preview-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  display: none;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.preview.active .preview-label,
.preview.active .preview-sub { display: block; }

/* Colour group sections */
.group-section { margin-bottom: 1.25rem; }
.group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.group-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.group-name {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.group-principle {
  font-size: 12px;
  font-style: italic;
  color: var(--faint);
  margin-left: auto;
  text-align: right;
  max-width: 200px;
  line-height: 1.4;
}

/* Ingredient cards */
.ingredient-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.ingredient-card {
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  padding: 10px 6px 8px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  position: relative;
}
.ingredient-card:hover { transform: translateY(-1px); }
.ingredient-card:active { transform: scale(0.96); }
.ingredient-card.selected {
  background: var(--chip);
}
.ingredient-card.selected::after {
  content: '✓';
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 9px;
  color: var(--muted);
}
.ingredient-emoji {
  font-size: 22px;
  display: block;
  margin-bottom: 5px;
  line-height: 1;
}
.ingredient-name {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.3;
}

/* Result card */
.result-swatch-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 1rem;
}
.result-swatch {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  flex-shrink: 0;
  transition: background 0.4s;
}
.result-name {
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.01em;
}
.result-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.04em;
}
.result-principle {
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.5;
}

/* Composition bars */
.composition { margin-top: 1rem; }
.comp-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.comp-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.comp-bar-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  width: 54px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.comp-bar-track {
  flex: 1;
  height: 5px;
  background: var(--chip);
  border-radius: 3px;
  overflow: hidden;
}
.comp-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.comp-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--faint);
  width: 16px;
  text-align: right;
  flex-shrink: 0;
}

/* Selected ingredients display */
.selected-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.selected-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  padding: 4px 10px 4px 6px;
  border-radius: var(--radius-pill);
  background: var(--chip);
  border: 1px solid var(--border);
  color: var(--muted);
}
.pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Shift suggestion */
.shift-box {
  margin-top: 1rem;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--chip);
}
.shift-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.shift-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.shift-ingredient {
  font-weight: 500;
  font-style: italic;
}

/* Empty state */
.empty {
  font-size: 14px;
  color: var(--faint);
  text-align: center;
  padding: 1.5rem 0;
  font-style: italic;
}

/* Actions */
.action-row {
  display: flex;
  gap: 8px;
  margin-top: 1rem;
}
.btn {
  padding: 9px 16px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.7; }
.btn-clear {
  color: var(--faint);
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.footer a {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--faint);
  text-decoration: none;
  letter-spacing: 0.04em;
}
.footer a:hover { color: var(--muted); }
.footer span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--faint);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Palette</h1>
    <span>Colour & Nourishment · Creatis</span>
  </div>

  <!-- Preview -->
  <div id="preview" class="preview">
    <span id="previewLabel" class="preview-label"></span>
    <span id="previewSub" class="preview-sub"></span>
  </div>

  <!-- Ingredient selection -->
  <div class="card">
    <div class="card-label">Select your ingredients</div>
    <div id="ingredientGrid"></div>
  </div>

  <!-- Result -->
  <div class="card">
    <div id="empty" class="empty">Select ingredients above to see your meal's colour profile.</div>
    <div id="result" style="display:none">
      <div class="result-swatch-row">
        <div id="resultSwatch" class="result-swatch"></div>
        <div>
          <div id="resultName" class="result-name"></div>
          <div id="resultSub" class="result-sub"></div>
          <div id="resultPrinciple" class="result-principle"></div>
        </div>
      </div>

      <div class="composition">
        <div class="comp-label">Composition</div>
        <div id="compBars"></div>
      </div>

      <div id="selectedPills" class="selected-pills"></div>

      <div id="shiftBox" class="shift-box" style="display:none">
        <div class="shift-label">Suggested shift</div>
        <div id="shiftText" class="shift-text"></div>
      </div>

      <div class="action-row">
        <button class="btn btn-clear" onclick="clearAll()">Clear all</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="http://bizemind.com" target="_blank" rel="noopener">bizemind</a>
    <span> — Built by Creatis</span>
  </div>

</div>
<script>
/* ─── Ingredient data ─── */
const GROUPS = [
  {
    key: "yellow",
    name: "Yellow",
    color: "#F5C518",
    principle: "Fast, bright, and dominant — powerful in the right proportion, unstable alone.",
    food: "Simple carbs — quick energy, real but short-lived.",
    ingredients: [
      { name: "White Rice", emoji: "🍚" },
      { name: "Banana",     emoji: "🍌" },
      { name: "Honey",      emoji: "🍯" },
      { name: "White Bread",emoji: "🍞" },
    ]
  },
  {
    key: "orange",
    name: "Orange",
    color: "#E8763A",
    principle: "Warm and bridging — neither extreme, but essential for depth.",
    food: "Complex carbs — slower energy, more sustained.",
    ingredients: [
      { name: "Sweet Potato", emoji: "🍠" },
      { name: "Oats",         emoji: "🌾" },
      { name: "Carrot",       emoji: "🥕" },
      { name: "Pumpkin",      emoji: "🎃" },
    ]
  },
  {
    key: "red",
    name: "Red",
    color: "#C94040",
    principle: "Structural and intense — the foundation that holds everything else together.",
    food: "Protein — builds and repairs. Sets the foundation of any meal.",
    ingredients: [
      { name: "Lentils", emoji: "🫘" },
      { name: "Eggs",    emoji: "🥚" },
      { name: "Chicken", emoji: "🍗" },
      { name: "Tofu",    emoji: "🧊" },
    ]
  },
  {
    key: "blue",
    name: "Blue",
    color: "#4A7FA5",
    principle: "Cool and moderating — slows the pace, deepens the outcome.",
    food: "Healthy fats — slows absorption, moderates intensity, sustains.",
    ingredients: [
      { name: "Olive Oil", emoji: "🫒" },
      { name: "Avocado",   emoji: "🥑" },
      { name: "Almonds",   emoji: "🌰" },
      { name: "Salmon",    emoji: "🐟" },
    ]
  },
  {
    key: "purple",
    name: "Purple",
    color: "#7B5EA7",
    principle: "Subtle and protective — works beneath the surface, easy to overlook, hard to replace.",
    food: "Phytonutrients — protective, restorative, easy to overlook.",
    ingredients: [
      { name: "Blueberries",  emoji: "🫐" },
      { name: "Beetroot",     emoji: "🫚" },
      { name: "Red Cabbage",  emoji: "🥬" },
      { name: "Turmeric",     emoji: "🌿" },
    ]
  },
  {
    key: "black",
    name: "Black",
    color: "#2A2420",
    principle: "Concentrated and transformative — a little is powerful, too much is destructive.",
    food: "Spices — transforms in small quantities. Overused, it overwhelms.",
    ingredients: [
      { name: "Black Pepper",     emoji: "🌶" },
      { name: "Cumin",            emoji: "🌱" },
      { name: "Dark Chocolate",   emoji: "🍫" },
      { name: "Coffee",           emoji: "☕" },
    ]
  },
  {
    key: "green",
    name: "Green",
    color: "#4A8C5C",
    principle: "Grounding and clearing — supports everything else, often the first thing skipped.",
    food: "Fibre + greens — clears, regulates, supports everything else.",
    ingredients: [
      { name: "Spinach",   emoji: "🥬" },
      { name: "Broccoli",  emoji: "🥦" },
      { name: "Cucumber",  emoji: "🥒" },
      { name: "Herbs",     emoji: "🌿" },
    ]
  },
  {
    key: "brown",
    name: "Brown",
    color: "#7A5C3A",
    principle: "Earthy and sustaining — no drama, just steady nourishment over time.",
    food: "Whole grains + legumes — slow-digesting, deeply nourishing.",
    ingredients: [
      { name: "Quinoa",       emoji: "🌾" },
      { name: "Whole Wheat",  emoji: "🫓" },
      { name: "Chickpeas",    emoji: "🫘" },
      { name: "Brown Rice",   emoji: "🍚" },
    ]
  }
];

/* ─── State ─── */
const selected = new Set(); // "groupKey:ingredientIndex"

/* ─── Build ingredient grid ─── */
const grid = document.getElementById("ingredientGrid");
GROUPS.forEach(group => {
  const section = document.createElement("div");
  section.className = "group-section";
  section.innerHTML = `
    <div class="group-header">
      <div class="group-dot" style="background:${group.color}"></div>
      <div class="group-name">${group.name}</div>
    </div>
    <div class="ingredient-grid" id="grid-${group.key}"></div>`;
  grid.appendChild(section);

  const iGrid = section.querySelector(`#grid-${group.key}`);
  group.ingredients.forEach((ing, i) => {
    const key = `${group.key}:${i}`;
    const card = document.createElement("div");
    card.className = "ingredient-card";
    card.id = `card-${key}`;
    card.style.borderColor = "var(--border)";
    card.innerHTML = `
      <span class="ingredient-emoji">${ing.emoji}</span>
      <span class="ingredient-name">${ing.name}</span>`;
    card.addEventListener("click", () => toggleIngredient(key, group, i, card));
    iGrid.appendChild(card);
  });
});

function toggleIngredient(key, group, idx, card) {
  if (selected.has(key)) {
    selected.delete(key);
    card.classList.remove("selected");
    card.style.borderColor = "var(--border)";
  } else {
    selected.add(key);
    card.classList.add("selected");
    card.style.borderColor = group.color;
  }
  updateResult();
}

/* ─── Colour mixing ─── */
function hexToRgb(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return [( n>>16)&255, (n>>8)&255, n&255];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}

function getMealColor(groupCounts) {
  // Weight by count — more ingredients from a group = stronger influence
  let r=0, g=0, b=0, total=0;
  Object.entries(groupCounts).forEach(([key, count]) => {
    if (count === 0) return;
    const group = GROUPS.find(g => g.key === key);
    const [cr,cg,cb] = hexToRgb(group.color);
    r += cr * count;
    g += cg * count;
    b += cb * count;
    total += count;
  });
  if (total === 0) return null;
  return rgbToHex(r/total, g/total, b/total);
}

/* ─── Colour profile naming ─── */
function getProfileName(groupCounts) {
  const sorted = Object.entries(groupCounts)
    .filter(([,v]) => v > 0)
    .sort((a,b) => b[1]-a[1]);
  if (sorted.length === 0) return null;
  const top = sorted.slice(0,2).map(([k]) => {
    const g = GROUPS.find(g => g.key === k);
    return g.name;
  });
  return top.join('–');
}

/* ─── Shift suggestion ─── */
function getSuggestion(groupCounts, totalSelected) {
  if (totalSelected < 2) return null;

  const counts = Object.entries(groupCounts).sort((a,b) => b[1]-a[1]);
  const dominant = counts[0];
  const missing = GROUPS.filter(g => !groupCounts[g.key] || groupCounts[g.key] === 0);

  // Rules
  const hasProtein = (groupCounts["red"] || 0) > 0;
  const hasFat     = (groupCounts["blue"] || 0) > 0;
  const hasGreen   = (groupCounts["green"] || 0) > 0;
  const hasSimpleCarb = (groupCounts["yellow"] || 0) > 0;
  const hasComplex = (groupCounts["orange"] || 0) > 0;

  if (!hasProtein) return `Add a <span class="shift-ingredient">Red</span> ingredient — lentils, eggs, or tofu — to give your meal structure and staying power.`;
  if (!hasFat) return `Add a <span class="shift-ingredient">Blue</span> ingredient — avocado, olive oil, or almonds — to slow energy release and sustain the meal.`;
  if (!hasGreen) return `Add a <span class="shift-ingredient">Green</span> ingredient — spinach, broccoli, or herbs — to ground and clear the composition.`;
  if (hasSimpleCarb && !hasComplex && !hasProtein) return `Your meal is running fast. Add an <span class="shift-ingredient">Orange</span> ingredient — oats or sweet potato — to bridge quick energy into something more sustained.`;
  if (dominant[1] >= 3) {
    const domGroup = GROUPS.find(g => g.key === dominant[0]);
    return `Heavy on <span class="shift-ingredient">${domGroup.name}</span>. Consider pulling back and adding contrast — your composition will be more balanced.`;
  }
  if (missing.length > 0 && totalSelected >= 4) {
    const suggest = missing[Math.floor(Math.random() * Math.min(2, missing.length))];
    return `You haven't used <span class="shift-ingredient">${suggest.name}</span> yet — ${suggest.food.toLowerCase()} Try adding one.`;
  }
  return `Well balanced. Your meal has good range across the colour spectrum.`;
}

/* ─── Update result ─── */
function updateResult() {
  const groupCounts = {};
  GROUPS.forEach(g => { groupCounts[g.key] = 0; });
  selected.forEach(key => {
    const [groupKey] = key.split(':');
    groupCounts[groupKey]++;
  });

  const totalSelected = selected.size;

  if (totalSelected === 0) {
    document.getElementById("empty").style.display = "block";
    document.getElementById("result").style.display = "none";
    document.getElementById("preview").classList.remove("active");
    document.getElementById("preview").style.background = "var(--chip)";
    return;
  }

  const hex = getMealColor(groupCounts);
  const profileName = getProfileName(groupCounts);

  // Determine dominant group for principle
  const dominantKey = Object.entries(groupCounts).sort((a,b)=>b[1]-a[1])[0][0];
  const dominantGroup = GROUPS.find(g => g.key === dominantKey);

  // Preview
  const preview = document.getElementById("preview");
  preview.style.background = hex;
  preview.classList.add("active");
  document.getElementById("previewLabel").textContent = profileName;
  document.getElementById("previewSub").textContent = `${totalSelected} ingredient${totalSelected!==1?'s':''}`;

  // Result swatch
  document.getElementById("resultSwatch").style.background = hex;
  document.getElementById("resultName").textContent = profileName;
  document.getElementById("resultSub").textContent = dominantGroup.food;
  document.getElementById("resultPrinciple").textContent = `"${dominantGroup.principle}"`;

  // Composition bars
  const maxCount = Math.max(...Object.values(groupCounts), 1);
  document.getElementById("compBars").innerHTML = GROUPS.map(g => {
    const count = groupCounts[g.key];
    if (count === 0) return '';
    const pct = (count / maxCount) * 100;
    return `<div class="comp-bar-wrap">
      <div class="comp-bar-label">${g.name}</div>
      <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${pct}%;background:${g.color}"></div></div>
      <div class="comp-count">${count}</div>
    </div>`;
  }).join("");

  // Selected pills
  const pills = [];
  selected.forEach(key => {
    const [groupKey, idx] = key.split(':');
    const group = GROUPS.find(g => g.key === groupKey);
    const ing = group.ingredients[parseInt(idx)];
    pills.push(`<div class="selected-pill">
      <span class="pill-dot" style="background:${group.color}"></span>
      ${ing.emoji} ${ing.name}
    </div>`);
  });
  document.getElementById("selectedPills").innerHTML = pills.join("");

  // Shift suggestion
  const suggestion = getSuggestion(groupCounts, totalSelected);
  const shiftBox = document.getElementById("shiftBox");
  if (suggestion) {
    document.getElementById("shiftText").innerHTML = suggestion;
    shiftBox.style.display = "block";
  } else {
    shiftBox.style.display = "none";
  }

  document.getElementById("empty").style.display = "none";
  document.getElementById("result").style.display = "block";
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.ingredient-card').forEach(c => {
    c.classList.remove("selected");
    c.style.borderColor = "var(--border)";
  });
  updateResult();
}
</script>
</body>
</html>
